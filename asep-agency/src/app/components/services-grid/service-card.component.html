<div
  class="service-card"
  [class.hovered]="isHovered()"
  [class.dimmed]="isHighlighted() && !isHovered()"
  (mouseenter)="onMouseEnter()"
  (mouseleave)="onMouseLeave()">

  <div class="card-bg"
       [style.background-image]="service().image_url ? 'url(' + service().image_url + ')' : 'none'"
       [style.background-color]="!service().image_url ? service().color : ''"></div>
  <div class="card-overlay"></div>

  <div class="card-content">
    <span class="card-icon">{{ service().icon }}</span>
    <h3 class="card-title">{{ service().title }}</h3>
    <p class="card-desc">{{ service().description }}</p>

    @if (isHovered()) {
      <div class="card-expanded">
        <p class="card-long-desc">{{ service().long_description }}</p>
        <ul class="card-features">
          @for (feature of service().features; track feature) {
            <li>{{ feature }}</li>
          }
        </ul>
        <a href="#order" class="card-cta">
          Demander un devis
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </a>
      </div>
    }
  </div>
</div>
