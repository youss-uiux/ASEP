<section id="services" class="services-section">
  <div class="section-container">
    <div class="section-header">
      <span class="section-tag">Nos Secteurs</span>
      <h2 class="section-title">
        10 domaines d'expertise,<br>
        <span class="accent">un seul partenaire</span>
      </h2>
      <p class="section-subtitle">
        Chaque prestation est assurée par des professionnels rigoureusement
        sélectionnés et formés selon les standards du Groupe ASEP.
      </p>
    </div>

    <div class="services-grid">
      @for (service of services(); track service.id) {
        <app-service-card
          [service]="service"
          [isHighlighted]="hoveredService() !== null && hoveredService() !== service.id"
          (hovered)="onServiceHover($event)" />
      }
    </div>
  </div>
</section>
