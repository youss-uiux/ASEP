<section id="testimonials" class="testimonials-section">
  <div class="testimonials-container">
    <div class="section-header">
      <span class="section-tag">Témoignages</span>
      <h2 class="section-title">
        Ce que disent<br>
        <span class="accent">nos familles</span>
      </h2>
    </div>

    <div class="testimonial-card">
      <div class="quote-icon">"</div>

      @if (currentTestimonial(); as t) {
        <div class="testimonial-content">
          <div class="stars">
            @for (star of starsArray(); track star) {
              <span class="star">★</span>
            }
          </div>
          <p class="testimonial-text">{{ t.content }}</p>
          <div class="testimonial-author">
            <img [src]="t.avatar" [alt]="t.name" class="author-avatar" loading="lazy"/>
            <div class="author-info">
              <span class="author-name">{{ t.name }}</span>
              <span class="author-role">{{ t.role }}</span>
            </div>
          </div>
        </div>
      }

      <div class="testimonial-nav">
        <button class="nav-btn" (click)="prev()" aria-label="Précédent">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
        </button>
        <div class="dots">
          @for (t of testimonials(); track t.id; let i = $index) {
            <button
              class="dot"
              [class.active]="i === activeIndex()"
              (click)="goTo(i)"
              [attr.aria-label]="'Témoignage ' + (i + 1)">
            </button>
          }
        </div>
        <button class="nav-btn" (click)="next()" aria-label="Suivant">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</section>
