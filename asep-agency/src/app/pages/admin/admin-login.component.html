<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <img src="logo.jpeg" alt="ASEP Agency" class="login-logo-img" />
    </div>

    <p class="login-subtitle">Accès réservé à l'équipe ASEP Agency</p>

    <div class="form-group">
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        [(ngModel)]="email"
        placeholder="admin@asep-agency.com"
        (keydown)="onKeyDown($event)"
        [class.has-error]="error()" />
    </div>

    <div class="form-group">
      <label for="password">Mot de passe</label>
      <div class="password-wrap">
        <input
          id="password"
          [type]="showPassword() ? 'text' : 'password'"
          [(ngModel)]="password"
          placeholder="••••••••"
          (keydown)="onKeyDown($event)"
          [class.has-error]="error()" />
        <button class="toggle-pwd" type="button" (click)="togglePassword()">
          @if (showPassword()) {
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          } @else {
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          }
        </button>
      </div>
    </div>

    @if (error()) {
      <div class="error-msg">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ error() }}
      </div>
    }

    <button class="btn-login" (click)="login()" [disabled]="loading()">
      @if (loading()) {
        <span class="btn-spinner"></span>
        Connexion...
      } @else {
        Se connecter
      }
    </button>

  </div>
</div>
